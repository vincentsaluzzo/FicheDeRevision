version: '3.8'

services:
  revision-generator:
    # Use pre-built image from GitHub Container Registry
    # Replace 'yourusername' with your actual GitHub username
    image: ghcr.io/vincentsaluzzo/fichederevision:latest
    pull_policy: always
    ports:
      - "3000:3000"  # Next.js server
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/database/database.sqlite
      - UPLOADS_DIR=/app/data/uploads
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MAX_FILE_SIZE=10485760
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_MAX_OUTPUT_TOKENS=${OPENAI_MAX_OUTPUT_TOKENS:-100000}
      - DEBUG_AI=${DEBUG_AI:-false}
    volumes:
      - revision_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  revision_data:
    driver: local